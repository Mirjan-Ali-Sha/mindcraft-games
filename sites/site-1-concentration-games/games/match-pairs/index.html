<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Match Pairs - MindCraft</title>
  <link rel="stylesheet" href="../../../../shared/css/design-tokens.css">
  <link rel="stylesheet" href="../../../../shared/css/components.css">
  <link rel="stylesheet" href="../../css/theme.css">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <!-- Game Header -->
  <header class="glass-header">
    <div class="container header-nav">
      <a href="../../index.html" class="btn btn--secondary" style="padding: 0.5rem 1rem; min-height: auto;">
        &larr; Back to Hub
      </a>
      <div class="game-stats">
        <span class="stat-badge">⏱ <strong id="timer-val">00:00</strong></span>
        <span class="stat-badge">⭐ Score: <strong id="score-val">0</strong></span>
        <span class="stat-badge">🏆 Best: <strong id="high-score-val">0</strong></span>
      </div>
    </div>
  </header>

  <!-- Progress bar -->
  <div class="progress-container">
    <div id="timer-progress" class="progress-fill"></div>
  </div>

  <!-- Game Play Area -->
  <main class="container game-container">
    <div class="game-meta">
      <div class="meta-item">Level: <strong id="level-val">1</strong>/3</div>
      <div class="meta-item">Matched: <strong id="pairs-matched">0</strong>/<strong id="pairs-total">8</strong></div>
      <div class="meta-item">Moves: <strong id="moves-val">0</strong></div>
    </div>

    <!-- Status banner instructions -->
    <div id="game-status-banner" class="status-banner animate-pulse">Memorize the card layout!</div>

    <!-- Grid Area -->
    <div id="card-grid" class="card-grid">
      <!-- Cards generated by script.js -->
    </div>

    <!-- Actions -->
    <div class="game-actions" style="margin-top: var(--space-lg); display: flex; justify-content: center; gap: var(--space-md);">
      <button id="btn-pause" class="btn btn--secondary">Pause ⏸</button>
      <button id="btn-restart" class="btn btn--secondary">Restart 🔄</button>
    </div>
  </main>

  <!-- Modals & Overlays -->
  <!-- 1. Pause Overlay -->
  <div id="overlay-pause" class="overlay">
    <div class="glass-card modal-content">
      <h2 style="font-size: 2rem; margin-bottom: var(--space-md);">Game Paused</h2>
      <p style="color: var(--text-secondary); margin-bottom: var(--space-lg);">Your card matches are saved. Resume when ready!</p>
      <button id="btn-resume" class="btn btn--primary" style="width: 100%;">Resume Game</button>
    </div>
  </div>

  <!-- 2. Game Over Overlay -->
  <div id="overlay-gameover" class="overlay">
    <div class="glass-card modal-content">
      <h2 id="gameover-title" style="font-size: 2.2rem; margin-bottom: var(--space-md); color: var(--color-danger);">Time's Up!</h2>
      <p id="gameover-desc" style="color: var(--text-secondary); margin-bottom: var(--space-lg);">You ran out of time to match the cards. Try again!</p>
      <div style="background: rgba(255,255,255,0.03); border-radius: var(--radius-sm); padding: var(--space-md); margin-bottom: var(--space-lg); display: flex; justify-content: space-around;">
        <div>
          <span style="display:block; font-size:0.85rem; color:var(--text-muted);">Score</span>
          <strong id="final-score" style="font-size:1.5rem; color:var(--text-primary);">0</strong>
        </div>
        <div>
          <span style="display:block; font-size:0.85rem; color:var(--text-muted);">Best Score</span>
          <strong id="best-score" style="font-size:1.5rem; color:var(--theme-accent);">0</strong>
        </div>
      </div>
      <div style="display: flex; gap: var(--space-md);">
        <button id="btn-retry" class="btn btn--primary" style="flex: 1;">Play Again</button>
        <a href="../../index.html" class="btn btn--secondary" style="flex: 1;">Exit to Hub</a>
      </div>
    </div>
  </div>

  <!-- Core Scripts -->
  <script src="../../../../shared/js/game-engine.js"></script>
  <script src="./js/script.js"></script>
</body>
</html>
